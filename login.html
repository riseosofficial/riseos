<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — RiseOS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--purple:#7C3AED;--purple-light:#A78BFA;--purple-glow:rgba(124,58,237,0.4);--black:#050507;--border:rgba(124,58,237,0.2);--text:#E8E8F0;--muted:#8888A0;--white:#FFFFFF}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,.12),transparent 70%);top:-100px;left:50%;transform:translateX(-50%)}
.orb-2{width:300px;height:300px;background:radial-gradient(circle,rgba(167,139,250,.08),transparent 70%);bottom:0;right:0}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);pointer-events:none}
nav{padding:20px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:rgba(5,5,7,0.85);backdrop-filter:blur(20px);position:fixed;top:0;width:100%;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--white);text-decoration:none}.logo span{color:var(--purple-light)}
.nav-link{color:var(--muted);text-decoration:none;font-size:14px}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:120px 20px 60px;position:relative;z-index:1}
.card{background:rgba(18,18,28,0.85);border:1px solid var(--border);border-radius:24px;padding:48px;width:100%;max-width:440px;backdrop-filter:blur(20px);position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple),transparent)}
.brand{text-align:center;margin-bottom:32px}
.brand a{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--white);text-decoration:none}.brand a span{color:var(--purple-light)}
h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--white);text-align:center;margin-bottom:8px}
.sub{color:var(--muted);text-align:center;font-size:14px;margin-bottom:32px;font-weight:300}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .3s;margin-bottom:24px}
.btn-google:hover{background:rgba(255,255,255,0.1);transform:translateY(-2px)}
.divider{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.line{flex:1;height:1px;background:var(--border)}
.divider span{font-size:12px;color:var(--muted)}
.group{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:all .3s}
input::placeholder{color:var(--muted)}
input:focus{border-color:var(--purple);box-shadow:0 0 20px rgba(124,58,237,.15)}
.forgot{text-align:right;margin-top:-10px;margin-bottom:20px}
.forgot a{font-size:13px;color:var(--purple-light);text-decoration:none}
.btn-main{width:100%;padding:16px;background:var(--purple);color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .3s;box-shadow:0 0 30px var(--purple-glow)}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 20px 50px var(--purple-glow)}
.btn-main:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px;font-size:13px;color:#FCA5A5;margin-bottom:16px;text-align:center}
.footer-link{text-align:center;margin-top:24px;font-size:14px;color:var(--muted)}
.footer-link a{color:var(--purple-light);text-decoration:none;font-weight:500}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="grid"></div>
<nav>
  <a href="index.html" class="logo">Rise<span>OS</span></a>
  <a href="signup.html" class="nav-link">Don't have an account? Sign up →</a>
</nav>
<main>
  <div class="card">
    <div class="brand"><a href="index.html">Rise<span>OS</span></a></div>
    <h1>Welcome Back</h1>
    <p class="sub">Sign in to access your personal OS</p>
    <button class="btn-google" id="googleBtn">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <div class="divider"><div class="line"></div><span>or sign in with email</span><div class="line"></div></div>
    <div class="error" id="err"></div>
    <div class="group"><label>Email Address</label><input type="email" id="email" placeholder="your@email.com"/></div>
    <div class="group"><label>Password</label><input type="password" id="password" placeholder="••••••••"/></div>
    <div class="forgot"><a href="#">Forgot password?</a></div>
    <button class="btn-main" id="submitBtn">Sign In to RiseOS</button>
    <div class="footer-link">Don't have an account? <a href="signup.html">Create one →</a></div>
  </div>
</main>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyBMC84ILtx_yM7qfyCaKVZS0hwGdoPIh8I",
  authDomain: "riseos-ce5f0.firebaseapp.com",
  projectId: "riseos-ce5f0",
  storageBucket: "riseos-ce5f0.firebasestorage.app",
  messagingSenderId: "1069243121918",
  appId: "1:1069243121918:web:0f30f6a067bfefdbf0e5af",
  measurementId: "G-5F7FXX25F6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

onAuthStateChanged(auth, user => {
  if(user) window.location.href = 'dashboard.html';
});

document.getElementById('googleBtn').onclick = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { showErr('Google sign-in failed. Try again.'); }
};

document.getElementById('submitBtn').onclick = async () => {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  if(!email||!pass){showErr('Please fill in all fields.');return;}
  btn.textContent='Signing in...';
  btn.disabled=true;
  try {
    await signInWithEmailAndPassword(auth,email,pass);
    window.location.href='dashboard.html';
  } catch(e) {
    btn.textContent='Sign In to RiseOS';
    btn.disabled=false;
    showErr('Invalid email or password. Please try again.');
  }
};

function showErr(msg){const el=document.getElementById('err');el.textContent=msg;el.style.display='block';}
</script>
</body>
</html>
