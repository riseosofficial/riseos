<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RiseOS</title>
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">Rise<span>OS</span></a>
            <div id="nav-auth">
                <a href="signup.html" class="btn btn-secondary" style="padding: 0.6rem 1.2rem; font-size: 0.95rem;">Sign Up</a>
            </div>
        </div>
    </nav>

    <!-- Particle Background Container -->
    <div id="particles-js"></div>

    <div class="auth-container">
        <div class="glass-card auth-card">
            <h2>Welcome Back</h2>
            <p>Enter your details to access your dashboard.</p>
            
            <div id="error-msg" class="error-message"></div>

            <button id="google-login" class="btn btn-google" style="width: 100%; justify-content: center; margin-bottom: 1.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Sign in with Google
            </button>

            <div class="divider">or</div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>

            <div class="auth-links">
                Don't have an account? <a href="signup.html">Sign up</a>
            </div>
        </div>
    </div>

    <!-- App Module -->
    <script type="module">
        import { auth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from './js/firebase-config.js';
        
        // This file shouldn't do direct redirects for logged-in users initially. 
        // Let app.js handle state listener redirecting.

        const loginForm = document.getElementById('login-form');
        const googleLoginBtn = document.getElementById('google-login');
        const errorMsg = document.getElementById('error-msg');

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Redirect handled by app.js listener
                })
                .catch((error) => {
                    console.error(error);
                    showError("Invalid email or password.");
                });
        });

        googleLoginBtn.addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .then((result) => {
                    // Redirect handled by app.js listener
                })
                .catch((error) => {
                    console.error(error);
                    showError(error.message);
                });
        });
    </script>

    <!-- Particle Initializer -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const particleContainer = document.getElementById('particles-js');
            if(particleContainer && typeof gsap !== 'undefined') {
                const particleCount = 40;
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    particle.style.left = Math.random() * 100 + 'vw';
                    particle.style.top = Math.random() * 100 + 'vh';
                    const size = Math.random() * 3 + 1;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particleContainer.appendChild(particle);
                    gsap.to(particle, {
                        y: `-${Math.random() * 200 + 100}px`,
                        x: `${Math.random() * 100 - 50}px`,
                        opacity: 0,
                        duration: Math.random() * 10 + 10,
                        repeat: -1,
                        ease: "none",
                        delay: Math.random() * -20
                    });
                    gsap.to(particle, {
                        opacity: Math.random() * 0.4 + 0.1,
                        duration: Math.random() * 2 + 1,
                        repeat: -1,
                        yoyo: true,
                        ease: "sine.inOut"
                    });
                }
            }
        });
    </script>

    <script type="module" src="js/app.js"></script>
</body>
</html>
