<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — RiseOS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--purple:#7C3AED;--purple-light:#A78BFA;--purple-glow:rgba(124,58,237,0.4);--black:#050507;--card:#12121C;--border:rgba(124,58,237,0.2);--text:#E8E8F0;--muted:#8888A0;--white:#FFFFFF}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.4}
nav{padding:20px 40px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:rgba(5,5,7,0.8);backdrop-filter:blur(20px);position:fixed;top:0;width:100%;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--white);text-decoration:none;letter-spacing:-.5px}.logo span{color:var(--purple-light)}
.nav-link{color:var(--muted);text-decoration:none;font-size:14px;transition:color .2s}.nav-link:hover{color:var(--purple-light)}
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,.12) 0%,transparent 70%);top:-100px;left:50%;transform:translateX(-50%);animation:float 8s ease-in-out infinite}
.orb-2{width:300px;height:300px;background:radial-gradient(circle,rgba(167,139,250,.08) 0%,transparent 70%);bottom:0;right:0;animation:float2 8s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-30px)}}
@keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.grid-lines{position:fixed;inset:0;background-image:linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%);pointer-events:none}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:120px 20px 60px;position:relative;z-index:1}
.auth-card{background:rgba(18,18,28,0.8);border:1px solid var(--border);border-radius:24px;padding:48px;width:100%;max-width:440px;backdrop-filter:blur(20px);position:relative;overflow:hidden;animation:fadeUp .6s ease forwards}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple),transparent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo a{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--white);text-decoration:none;letter-spacing:-.5px}
.auth-logo a span{color:var(--purple-light)}
.auth-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--white);text-align:center;margin-bottom:8px;letter-spacing:-.5px}
.auth-sub{color:var(--muted);text-align:center;font-size:14px;margin-bottom:36px;font-weight:300}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .3s;margin-bottom:24px;text-decoration:none}
.btn-google:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);transform:translateY(-2px)}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:12px;color:var(--muted);white-space:nowrap}
.form-group{margin-bottom:20px}
label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:8px}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:all .3s}
input::placeholder{color:var(--muted)}
input:focus{border-color:var(--purple);box-shadow:0 0 20px rgba(124,58,237,.15);background:rgba(124,58,237,.05)}
.btn-submit{width:100%;padding:16px;background:var(--purple);color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .3s;animation:glow 3s ease infinite;margin-top:4px}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 20px 50px var(--purple-glow)}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--purple-glow)}50%{box-shadow:0 0 40px rgba(124,58,237,.6)}}
.error-msg{display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;font-size:13px;color:#FCA5A5;margin-bottom:20px;text-align:center}
.terms{font-size:12px;color:var(--muted);text-align:center;margin-top:16px;font-weight:300}
.terms a{color:var(--purple-light);text-decoration:none}
.auth-footer{text-align:center;margin-top:24px;font-size:14px;color:var(--muted)}
.auth-footer a{color:var(--purple-light);text-decoration:none;font-weight:500;transition:opacity .2s}.auth-footer a:hover{opacity:.7}
.btn-submit.loading{pointer-events:none;opacity:.7}
/* BADGE */
.beta-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(124,58,237,.15);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:12px;color:var(--purple-light);margin:0 auto 20px;display:flex;width:fit-content;margin-left:auto;margin-right:auto}
.badge-dot{width:6px;height:6px;background:var(--purple-light);border-radius:50%;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="grid-lines"></div>

<nav>
  <a href="index.html" class="logo">Rise<span>OS</span></a>
  <a href="login.html" class="nav-link">Already have an account? Login →</a>
</nav>

<main>
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html">Rise<span>OS</span></a>
    </div>

    <div class="beta-badge">
      <span class="badge-dot"></span>
      Beta Access — Limited Spots
    </div>

    <h1 class="auth-title">Create Your Account</h1>
    <p class="auth-sub">Join the 1% who actually execute. Start your 90-day transformation.</p>

    <button class="btn-google" onclick="handleGoogleSignUp()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or sign up with email</span>
      <div class="divider-line"></div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="John Smith" />
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 8 characters" />
    </div>

    <button class="btn-submit" id="submitBtn" onclick="handleEmailSignUp()">
      Create Account → Get Access
    </button>

    <p class="terms">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a></p>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in →</a>
    </div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = "dashboard.html";
});

window.handleGoogleSignUp = async () => {
  try {
    await signInWithPopup(auth, provider);
    window.location.href = "https://buy.stripe.com/test_3cI5kCaCmbO6auWeeqd3i00";
  } catch (e) {
    showError("Google sign-up failed. Please try again.");
  }
};

window.handleEmailSignUp = async () => {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const btn = document.getElementById("submitBtn");

  if (!name || !email || !password) { showError("Please fill in all fields."); return; }
  if (password.length < 8) { showError("Password must be at least 8 characters."); return; }

  btn.textContent = "Creating your account...";
  btn.classList.add("loading");

  try {
    const result = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(result.user, { displayName: name });
    window.location.href = "https://buy.stripe.com/test_3cI5kCaCmbO6auWeeqd3i00";
  } catch (e) {
    btn.textContent = "Create Account → Get Access";
    btn.classList.remove("loading");
    if (e.code === "auth/email-already-in-use") showError("Email already registered. Sign in instead.");
    else showError("Something went wrong. Please try again.");
  }
};

function showError(msg) {
  const el = document.getElementById("errorMsg");
  el.textContent = msg;
  el.style.display = "block";
}
</script>
</body>
</html>
